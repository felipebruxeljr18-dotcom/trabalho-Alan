            .papelao {

                display: flex;
                justify-content: space-around;
                height: 100px;
                background-color: blue;
                align-items: center;
                
                
            }

                display: flex;
                justify-content: end;
                align-items: center;
                background-color: rgb(0, 174, 255);


            }

                width: 800px;
                border: 10px black solid;

                height: 710px;

                justify-content: center;
                margin:block;
                margin: 5px;
                background-color: white;
            }
            .ofertao{
                display: flex;
                justify-content: space-around;
                
                margin: 30px;
                align-items: center;
            }
